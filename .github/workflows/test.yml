name: Test App
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 02StartingProject/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: 02StartingProject
      - name: Run tests
        run: npm test
        working-directory: 02StartingProject
  
  deploy:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 02StartingProject/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: 02StartingProject
      - name: Build project
        run: npm run build
        working-directory: 02StartingProject
      - name: Deploy to Azure
        run: echo "Deploying to Azure..."
